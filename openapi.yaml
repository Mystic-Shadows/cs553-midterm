openapi: 3.0.3
info:
  title: Midterm API
  version: 1.0.0
  description: This API stores tasks.

servers:
  - url: http://localhost:3000

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /tasks:
    get:
      summary: Gets the list of all tasks
      responses:
        "200":
          description: List of all tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Makes a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Successfully created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Request Issue (Missing Fields, Invalid Type, Invalid Data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /tasks/{id}:
    get:
      summary: Gets the task with the supplied id
      parameters:
        - name: id
          in: path
          required: true
          description: The task ID from the URL path.
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: The requested task was returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task with supplied id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    put:
      summary: replaces the task with the supplied id
      parameters:
        - name: id
          in: path
          required: true
          description: The task ID from the URL path.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskReplace"
      responses:
        "200":
          description: The requested task was replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Request Issue (Missing Fields, Invalid Type, Invalid Data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Task with supplied id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    patch:
      summary: updates the task with the supplied id
      parameters:
        - name: id
          in: path
          required: true
          description: The task ID from the URL path.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: The requested task was updated (Must have one field other than 'id' to receive. Will get a 400 if only 'id' is filled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Request Issue (Missing Fields, Invalid Type, Invalid Data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Task with supplied id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
    delete:
      summary: deletes the task with the supplied id
      parameters:
        - name: id
          in: path
          required: true
          description: The task ID from the URL path.
          schema:
            type: integer
            example: 1
      responses:
        "204":
          description: The requested task was deleted
        "404":
          description: Task with supplied id does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "midterm"
        course:
          type: string
          example: "cs-553"
        completed:
          type: boolean
          example: true
    TaskCreate:
      type: object
      required:
        - title
        - course
        - completed
      properties:
        title:
          type: string
          example: "midterm"
        course:
          type: string
          example: "cs-553"
        completed:
          type: boolean
          example: true
    TaskReplace:
      type: object
      required:
        - id
        - title
        - course
        - completed
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "midterm"
        course:
          type: string
          example: "cs-553"
        completed:
          type: boolean
          example: true
    TaskUpdate:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "midterm"
        course:
          type: string
          example: "cs-553"
        completed:
          type: boolean
          example: true
    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: A title, course, and completed status is required.
    NotFoundError:
      type: object
      properties:
        error:
          type: string
          example: Not Found.